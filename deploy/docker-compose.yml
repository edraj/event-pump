# Local/smoke PostgreSQL only — production uses the platform's existing PG 18.
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: eventpump
      POSTGRES_PASSWORD: eventpump
      POSTGRES_DB: eventpump
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventpump"]
      interval: 2s
      timeout: 2s
      retries: 30
