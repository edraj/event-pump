name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  server:
    name: server — dotnet test + Native AOT publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Test against PostgreSQL 18
        working-directory: server
        env:
          EP_TEST_CONNSTRING: Host=localhost;Port=5432;Username=ci;Password=ci;Database=postgres
        run: dotnet test --nologo
      - name: Native AOT prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q clang zlib1g-dev
      - name: Native AOT publish (zero warnings — TreatWarningsAsErrors)
        run: |
          dotnet publish server/src/EventPump -c Release -o /tmp/aot-publish
          # usage exit code 64 proves the native binary actually runs
          /tmp/aot-publish/eventpump || test $? -eq 64

  web-sdk:
    name: web SDK — vitest + size budget + Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: sdks/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdks/web/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Build (fails if ep.js exceeds the 8KB gzip budget)
        run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  flutter-sdk:
    name: flutter SDK — analyze + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: sdks/flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  smoke:
    name: end-to-end smoke (all three producer paths)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdks/web/package-lock.json
      - name: Prerequisites (AOT toolchain + psql client)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q clang zlib1g-dev postgresql-client
      - name: Web SDK deps + Playwright chromium
        working-directory: sdks/web
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run smoke (compose PostgreSQL 18 -> AOT binaries -> headless IIFE
          + flutter-format batch + SQL contract -> mock destinations)
        run: ./deploy/smoke.sh
