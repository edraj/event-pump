name: event_pump
description: Event Pump Flutter SDK — first-party event ingestion client.
version: 0.1.0
homepage: https://github.com/edraj/event-pump

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  # transport — matches the app's HTTP client (approved decision 2026-07-12)
  dio: ^5.7.0
  # device identity + session persistence (SPEC §2/§3)
  shared_preferences: ^2.3.0
  # app_version / build context (SPEC §5)
  package_info_plus: ^9.0.0
  # os / os_version / model / category context (SPEC §5)
  device_info_plus: ^12.0.0
  # connection type context + flush on regained connectivity (SPEC §5/§7)
  connectivity_plus: ^7.0.0
  # app-support dir for the JSONL queue file (SPEC §7)
  path_provider: ^2.1.0
  # UUIDv4 (anonymous_id, event_id) + UUIDv7 (session_key)
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  fake_async: ^1.3.0
  flutter_lints: ^6.0.0
